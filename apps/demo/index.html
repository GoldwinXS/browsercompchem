<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrowserCompChem — geometry optimization</title>
    <style>
      :root {
        --bg: #0d0f16;
        --panel: #141824;
        --panel-border: #262c3d;
        --fg: #d7dce8;
        --muted: #7f889e;
        --accent: #5b8cff;
        --good: #46d18a;
        --warn: #e6b84a;
        --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
      }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: var(--mono);
        overflow: hidden;
      }
      #app { position: fixed; inset: 0; }
      #app canvas { display: block; }
      #nogl {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center;
        color: var(--muted); font-size: 13px; text-align: center; padding: 2rem;
      }
      #ui {
        position: fixed; top: 16px; left: 16px; width: 320px;
        background: rgba(20, 24, 36, 0.92);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 14px 16px;
        font-size: 12px;
        line-height: 1.5;
        backdrop-filter: blur(6px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.45);
        user-select: none;
      }
      #ui h1 {
        font-size: 12px; font-weight: 600; margin: 0 0 10px;
        letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted);
      }
      .row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
      label { color: var(--muted); }
      select, button {
        font-family: var(--mono); font-size: 12px;
        background: var(--panel); color: var(--fg);
        border: 1px solid var(--panel-border); border-radius: 6px;
        padding: 6px 10px; cursor: pointer;
      }
      select { flex: 1; }
      button:hover:not(:disabled) { border-color: var(--accent); }
      button:disabled { opacity: 0.4; cursor: default; }
      button.primary { background: #1b2540; border-color: #33447a; color: #cdd8ff; }
      .btns { display: flex; gap: 8px; }
      .btns button { flex: 1; }
      .readout {
        display: grid; grid-template-columns: auto 1fr; gap: 2px 12px;
        margin: 12px 0; font-variant-numeric: tabular-nums;
      }
      .readout .k { color: var(--muted); }
      .readout .v { text-align: right; }
      #plot { width: 100%; height: 96px; display: block; margin-top: 6px;
        background: #0b0e15; border: 1px solid var(--panel-border); border-radius: 6px; }
      #status {
        margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--panel-border);
        color: var(--muted); min-height: 1.5em;
      }
      #status.good { color: var(--good); }
      #status.warn { color: var(--warn); }
      .plot-label { color: var(--muted); font-size: 10px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="nogl">no WebGL2 context available in this environment — 3D view disabled; optimization still runs (headless-verifiable).</div>
    <div id="ui">
      <h1>Geometry Optimization · ANI-2x</h1>
      <div class="row">
        <label for="mol">molecule</label>
        <select id="mol"></select>
      </div>
      <div class="btns">
        <button id="perturb">Perturb</button>
        <button id="optimize" class="primary">Optimize</button>
      </div>
      <div class="readout">
        <span class="k">energy</span><span class="v" id="r-energy">—</span>
        <span class="k">max force</span><span class="v" id="r-force">—</span>
        <span class="k">step</span><span class="v" id="r-step">—</span>
        <span class="k">elapsed</span><span class="v" id="r-elapsed">—</span>
      </div>
      <div class="plot-label">energy (Ha) vs step</div>
      <svg id="plot" viewBox="0 0 300 96" preserveAspectRatio="none"></svg>
      <div id="status">initializing…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
