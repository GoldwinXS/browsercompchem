<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ANI-2x ONNX browser benchmark</title>
<style>
  body { font-family: ui-monospace, Consolas, monospace; margin: 1.2rem; background:#111; color:#ddd; }
  h1 { font-size: 1.1rem; }
  #status { color:#6cf; } #done { color:#6f6; font-weight:bold; }
  pre { white-space: pre-wrap; background:#000; padding:.6rem; border:1px solid #333; }
</style>
</head>
<body>
<h1>ANI-2x ONNX browser benchmark &mdash; <span id="status">init</span> <span id="done"></span></h1>
<pre id="log"></pre>
<!-- UMD build exposes window.ort with webgpu + wasm EPs -->
<script src="../node_modules/onnxruntime-web/dist/ort.all.min.js"></script>
<script>
  // point wasm loader at the dist folder (served locally)
  ort.env.wasm.wasmPaths = "/node_modules/onnxruntime-web/dist/";
  ort.env.wasm.numThreads = Math.min(4, (navigator.hardwareConcurrency || 4));
</script>
<script type="module" src="./bench.js"></script>
</body>
</html>
